<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="MD Docs — A rich markdown editor with media support, running entirely in your browser.">
  <title>MD Docs</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📝</text></svg>">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <!-- Loading -->
  <div id="loading">Loading MD Docs...</div>

  <!-- App -->
  <div id="app" class="hidden">
    <!-- Header -->
    <header id="app-header">
      <button id="sidebar-toggle" class="header-btn" title="Toggle sidebar">☰</button>
      <h1>MD Docs</h1>
      <div class="header-right">
        <button id="view-toggle" class="header-btn" title="Toggle view mode">📐</button>
        <button id="theme-toggle" class="header-btn" title="Toggle theme">🌙</button>
      </div>
    </header>

    <!-- Content -->
    <div id="app-content">
      <!-- Sidebar -->
      <aside id="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-actions">
            <button id="new-doc">+ New Document</button>
            <button id="delete-doc" title="Delete current document">🗑️</button>
          </div>
          <input type="search" id="search-docs" placeholder="Search documents..." autocomplete="off">
        </div>
        <ul id="doc-list"></ul>
      </aside>

      <!-- Main Area -->
      <main id="main-area">
        <!-- Toolbar -->
        <div id="editor-toolbar">
          <!-- Text formatting -->
          <button class="toolbar-btn" data-cmd="bold" title="Bold (Ctrl+B)"><b>B</b></button>
          <button class="toolbar-btn" data-cmd="italic" title="Italic (Ctrl+I)"><i>I</i></button>
          <button class="toolbar-btn" data-cmd="strikethrough" title="Strikethrough"><s>S</s></button>
          <div class="toolbar-separator"></div>
          <button class="toolbar-btn" data-cmd="h1" title="Heading 1">H1</button>
          <button class="toolbar-btn" data-cmd="h2" title="Heading 2">H2</button>
          <button class="toolbar-btn" data-cmd="h3" title="Heading 3">H3</button>
          <div class="toolbar-separator"></div>
          <button class="toolbar-btn" data-cmd="ul" title="Bullet list">•</button>
          <button class="toolbar-btn" data-cmd="ol" title="Numbered list">1.</button>
          <button class="toolbar-btn" data-cmd="quote" title="Quote">❝</button>
          <button class="toolbar-btn" data-cmd="code" title="Code">&lt;/&gt;</button>
          <button class="toolbar-btn" data-cmd="hr" title="Horizontal rule">—</button>
          <button class="toolbar-btn" data-cmd="link" title="Link">🔗</button>
          <div class="toolbar-separator"></div>

          <!-- Media insert -->
          <button class="toolbar-btn" id="insert-image" title="Insert image">📷</button>
          <button class="toolbar-btn" id="insert-video" title="Insert video">🎬</button>
          <button class="toolbar-btn" id="insert-audio" title="Insert audio">🎵</button>
          <button class="toolbar-btn" id="record-audio" title="Record audio">🎙️</button>
          <div class="toolbar-separator"></div>

          <!-- Actions -->
          <span class="toolbar-spacer"></span>
          <div class="toolbar-actions">
            <button class="toolbar-btn" id="btn-save" title="Save (Ctrl+S)">💾 Save</button>
            <button class="toolbar-btn" id="btn-import" title="Import .md file">📥</button>
            <button class="toolbar-btn" id="btn-export-md" title="Export as .md">📤 MD</button>
            <button class="toolbar-btn" id="btn-export-html" title="Export as HTML">📤 HTML</button>
          </div>
        </div>

        <!-- Editor -->
        <div id="editor-container">
          <textarea id="editor-pane" placeholder="Write your markdown here..." spellcheck="true"></textarea>
          <div id="preview-pane"></div>
        </div>

        <!-- Status Bar -->
        <div id="status-bar">
          <span id="doc-title-status">Untitled</span>
          <span id="save-status"></span>
        </div>
      </main>
    </div>
  </div>

  <!-- Recording Modal -->
  <div id="recorder-modal" class="modal hidden">
    <div class="modal-content">
      <button class="modal-close">&times;</button>
      <h2>🎙️ Record Audio</h2>
      <p id="recorder-status">Click Start to begin recording</p>
      <div id="recorder-timer">00:00</div>
      <div class="recorder-controls">
        <button id="recorder-start">🔴 Start</button>
        <button id="recorder-stop" disabled>⏹ Stop</button>
      </div>
      <div id="recorder-preview" class="hidden">
        <audio controls></audio>
        <button id="recorder-insert">📄 Insert into Document</button>
      </div>
      <button id="recorder-close">Cancel</button>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="assets/js/storage.js"></script>
  <script src="assets/js/recorder.js"></script>
  <script src="assets/js/editor.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
